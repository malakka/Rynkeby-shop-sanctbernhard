const gId  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const toN  = v => { const n = parseFloat(v); return (isNaN(n)||n===0) ? null : n; };
const fmtP = v => { const n = toN(v); return n ? n.toFixed(2).replace('.',',') + ' €' : null; };
const lsG  = k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } };
const lsS  = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

const jbFetch = async (key, bin) => {
  try {
    const r = await fetch(JB+'/'+bin+'/latest', { headers:{ 'X-Master-Key':key, 'X-Bin-Meta':'false' } });
    if(!r.ok) return null;
    const d = await r.json();
    if(Array.isArray(d)) return d;
    if(Array.isArray(d.record)) return d.record;
    return [];
  } catch { return null; }
};
const jbSave = async (key, bin, data) => {
  try {
    const r = await fetch(JB+'/'+bin, { method:'PUT', headers:{ 'Content-Type':'application/json','X-Master-Key':key }, body:JSON.stringify(data) });
    return r.ok;
  } catch { return false; }
};

const IS  = { border:'1px solid #e2e8f0', borderRadius:10, padding:'10px 14px', fontSize:14, outline:'none', width:'100%', background:'#fff', fontFamily:'inherit' };
const lbl = { fontSize:11, fontWeight:700, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4, display:'block' };

function Btn({ children, onClick, col, dis, sx }) {
  const c = col||'#dc2626', d = dis||false;
  return html`<button onClick=${onClick} disabled=${d} style=${{ background:d?'#f1f5f9':c, color:d?'#94a3b8':'#fff', border:'none', borderRadius:10, padding:'10px 18px', fontSize:14, fontWeight:700, cursor:d?'not-allowed':'pointer', fontFamily:'inherit', ...(sx||{}) }}>${children}</button>`;
}

function PForm({ p, onChange, onSave, onCancel }) {
  const s = { ...IS, borderRadius:8, padding:'8px 12px', fontSize:13 };
  const fields = [
    { k:'name', l:'Artikelname',          span:2 },
    { k:'nr',   l:'Bestell-Nr.',          span:1 },
    { k:'cat',  l:'Kategorie',            span:1 },
    { k:'desc', l:'Beschreibung',         span:2 },
    { k:'img',  l:'Foto-URL',             span:2 },
    { k:'uvp',  l:'UVP (€)',         span:1, t:'number' },
    { k:'preis',l:'Sammelpreis (€)', span:1, t:'number' }
  ];
  return html`<div style=${{ background:'#fef2f2', border:'1px solid #fecaca', borderRadius:12, padding:16, marginBottom:10 }}>
    <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:12 }}>
      ${fields.map(f => html`<div key=${f.k} style=${{ gridColumn:f.span===2?'1 / -1':'auto' }}>
        <label style=${lbl}>${f.l}</label>
        <input type=${f.t||'text'} step='0.01' style=${s} value=${p[f.k]||''} onChange=${e => onChange({...p,[f.k]:e.target.value})} />
      </div>`)}
    </div>
    <div style=${{ display:'flex', gap:8 }}>
      <${Btn} onClick=${onSave} sx=${{ padding:'8px 16px', fontSize:13, borderRadius:8 }}>Speichern<//>
      <button onClick=${onCancel} style=${{ background:'transparent', border:'1px solid #e2e8f0', color:'#64748b', borderRadius:8, padding:'8px 16px', fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>Abbrechen</button>
    </div>
  </div>`;
}

  const importCSV = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        const Q = 34;
        const parseCSV = (str) => {
          const rows = [];
          let row = [], cell = '', inQ = false;
          for(let i = 0; i < str.length; i++) {
            const c = str[i], n = str[i+1];
            const isQ = c.charCodeAt(0) === Q;
            if(inQ) {
              if(isQ && n && n.charCodeAt(0) === Q) { cell += c; i++; }
              else if(isQ) { inQ = false; }
              else { cell += c; }
            } else if(isQ) {
              inQ = true;
            } else if(c === ',' || c === ';') {
              row.push(cell.trim()); cell = '';
            } else if(c.charCodeAt(0) === 10 || c.charCodeAt(0) === 13) {
              if(c.charCodeAt(0) === 13 && n && n.charCodeAt(0) === 10) i++;
              row.push(cell.trim());
              if(row.some(x => x)) rows.push(row);
              row = []; cell = '';
            } else {
              cell += c;
            }
          }
          row.push(cell.trim());
          if(row.some(x => x)) rows.push(row);
          return rows;
        };
        const rows = parseCSV(text);
        const hIdx = rows.findIndex(r => {
          const s = r.join('').toLowerCase();
          return s.includes('name') || s.includes('bestell');
        });
        if(hIdx === -1) { alert('Keine Überschriftenzeile gefunden.'); return; }
        const headers = rows[hIdx].map(h => h.trim().toLowerCase());

          name:  headers.findIndex(h => h.includes('name')),

          desc:  headers.findIndex(h => h.includes('beschreibung') || h.includes('desc')),

          img:   headers.findIndex(h => h.includes('foto') || h.includes('img') || h.includes('bild')),

        const cleanP = v => String(v).replace(/[^0-9,.]/g,'').replace(',','.').trim();
        const parsed = rows.slice(hIdx + 1).map((cols, i) => {
          const nr   = idx.nr   >= 0 ? cols[idx.nr]   : '';

          <div style=${{fontSize:17,fontWeight:800,color:'#0f172a'}}>${camp.name||'Sammelbestellung'}</div>
        </div>
        <button onClick=${()=>{setAok(false);setPage('order');}} style=${{background:'transparent',border:'none',color:'#94a3b8',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>← Zur Bestellung</button>
      </div>
      <div style=${{background:'#fff',borderBottom:'1px solid #e2e8f0',display:'flex',padding:'0 24px'}}>
        <button style=${tb('orders')}  onClick=${()=>setAtab('orders')}>Bestellungen (${orders.length})</button>
        <button style=${tb('products')} onClick=${()=>setAtab('products')}>Produkte (${prods.length})</button>
        <button style=${tb('settings')} onClick=${()=>setAtab('settings')}>Einstellungen</button>
      </div>
      <div style=${{maxWidth:680,margin:'0 auto',padding:24}}>

        ${atab==='orders'?html`<div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#0f172a'}}>Eingegangene Bestellungen</div>
            <div style=${{display:'flex',gap:8}}>
              <${Btn} onClick=${loadOrders} col='#475569' sx=${{padding:'8px 14px',fontSize:13,borderRadius:8}}>${fetching?'Lädt…':'↻ Aktualisieren'}<//>
              ${orders.length>0?html`<${Btn} onClick=${exportCSV} col='#0f172a' sx=${{padding:'8px 14px',fontSize:13,borderRadius:8}}>📊 CSV<//>` :''}
              ${orders.length>0&&gsUrl?html`<${Btn} onClick=${pushToSheets} col='#16a34a' sx=${{padding:'8px 14px',fontSize:13,borderRadius:8,opacity:gsPush?0.6:1}}>${gsPush?'Überträgt…':'📗 Sheets'}<//>`:''}
            </div>
          </div>
          ${gsMsg?html`<p style=${{fontSize:13,marginBottom:12,color:gsMsg[0]==='✓'?'#16a34a':'#dc2626'}}>${gsMsg}</p>`:''}
          ${!jbKey||!jbBin?html`<div style=${{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:16,fontSize:13,color:'#92400e'}}>⚠ Bitte JSONBin-Zugangsdaten unter Einstellungen hinterlegen.</div>`:html`<div>
            ${Object.keys(sum).length>0?html`<div style=${{marginBottom:20}}>
              <div style=${{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>Gesamtübersicht</div>
              <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginBottom:16}}>
                ${Object.entries(sum).map(([name,qty])=>html`<div key=${name} style=${{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:'14px 16px'}}>
                  <div style=${{fontSize:30,fontWeight:800,color:'#dc2626',lineHeight:1}}>${qty}×</div>
                  <div style=${{fontSize:12,color:'#475569',fontWeight:600,marginTop:5,lineHeight:1.3}}>${name}</div>
                </div>`)}
              </div>
            </div>`:''}
            ${orders.length===0?html`<div style=${{textAlign:'center',padding:'48px 0',color:'#94a3b8',fontSize:14}}>Noch keine Bestellungen. Klicke auf Aktualisieren.</div>`:html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
              ${orders.map(o=>html`<div key=${o.id} style=${{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>
                <button onClick=${()=>setExp(exp===o.id?null:o.id)} style=${{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',background:'transparent',border:'none',cursor:'pointer',textAlign:'left',fontFamily:'inherit'}}>
                  <div><span style=${{fontWeight:700,color:'#0f172a',fontSize:14}}>${o.buyer.name}</span><span style=${{color:'#94a3b8',fontSize:13,marginLeft:10}}>${o.buyer.email}</span></div>
                  <div style=${{textAlign:'right'}}>
                    <div style=${{fontSize:11,color:'#94a3b8'}}>${new Date(o.ts).toLocaleDateString('de-DE')}</div>
                    <div style=${{fontSize:13,color:'#64748b'}}>${o.items.reduce((s,i)=>s+i.qty,0)} Artikel</div>
                  </div>
                </button>
                ${exp===o.id?html`<div style=${{borderTop:'1px solid #f1f5f9',padding:'12px 18px',background:'#f8fafc'}}>
                  ${o.items.map((i,ix)=>html`<div key=${ix} style=${{display:'flex',justifyContent:'space-between',fontSize:13,padding:'3px 0'}}>
                    <span style=${{color:'#374151'}}>${i.qty}× ${i.name}</span>
                    <span style=${{color:'#64748b'}}>${i.preis?fmtP(i.qty*i.preis):'–'}</span>
                  </div>`)}
                  ${o.buyer.note?html`<p style=${{fontSize:12,color:'#94a3b8',marginTop:8,fontStyle:'italic'}}>"${o.buyer.note}"</p>`:''}
                </div>`:''}
              </div>`)}
            </div>`}
          </div>`}
        </div>`:''}

        ${atab==='products'?html`<div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#0f172a'}}>Produkte</div>
            <div style=${{display:'flex',gap:8}}>
              <label style=${{background:'#475569',color:'#fff',borderRadius:8,padding:'8px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                📥 CSV importieren
                <input type='file' accept='.csv' onChange=${importCSV} style=${{display:'none'}} />
              </label>
              <${Btn} onClick=${()=>setNewP({id:gId(),name:'',nr:'',cat:'',desc:'',img:'',uvp:'',preis:''})} sx=${{padding:'8px 16px',fontSize:13,borderRadius:8}}>+ Hinzufügen<//>
            </div>
          </div>
          <div style=${{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:10,padding:'10px 14px',fontSize:12,color:'#64748b',marginBottom:14}}>
            📋 CSV-Format: <b>Bestell-Nr.;Name;UVP;Sammelpreis;Foto-URL</b> (erste Zeile = Überschriften)
          </div>
          ${newP?html`<${PForm} p=${newP} onChange=${setNewP} onSave=${()=>{saveProds([...prods,newP]);setNewP(null);}} onCancel=${()=>setNewP(null)} />` :''}
          <div style=${{display:'flex',flexDirection:'column',gap:8}}>
            ${prods.map(p=>editP?.id===p.id?html`<${PForm} key=${p.id} p=${editP} onChange=${setEditP}
                onSave=${()=>{saveProds(prods.map(x=>x.id===editP.id?editP:x));setEditP(null);}}
                onCancel=${()=>setEditP(null)} />`:html`<div key=${p.id} style=${{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:'13px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{fontWeight:700,fontSize:14,color:'#0f172a'}}>${p.name}</div>
                <div style=${{fontSize:12,color:'#94a3b8',marginTop:2}}>
                  ${p.nr?html`<span style=${{marginRight:10}}>Nr.: ${p.nr}</span>`:''}
                  ${p.uvp?html`<span style=${{marginRight:10}}>UVP: ${fmtP(p.uvp)}</span>`:''}
                  ${p.preis?html`<span style=${{color:'#dc2626',fontWeight:700}}>Sammelpreis: ${fmtP(p.preis)}</span>`:html`<span style=${{color:'#f59e0b',fontWeight:600}}>⚠ Sammelpreis fehlt</span>`}
                </div>
              </div>
              <div style=${{display:'flex',gap:8,flexShrink:0}}>
                <button onClick=${()=>setEditP({...p})} style=${{fontSize:12,color:'#64748b',border:'1px solid #e2e8f0',background:'transparent',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontFamily:'inherit'}}>Bearbeiten</button>
                <button onClick=${()=>saveProds(prods.filter(x=>x.id!==p.id))} style=${{fontSize:12,color:'#dc2626',border:'1px solid #fecaca',background:'transparent',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontFamily:'inherit'}}>Löschen</button>
              </div>
            </div>`)}
          </div>
        </div>`:''}

        ${atab==='settings'?html`<div style=${{display:'flex',flexDirection:'column',gap:20}}>
          <div style=${{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:16,padding:24}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#1e40af',marginBottom:6}}>🔗 JSONBin.io Verbindung</div>
            <div style=${{display:'grid',gap:10}}>
              <div><label style=${lbl}>API Key (X-Master-Key)</label>
                <input type='password' style=${{...IS,borderColor:'#bfdbfe'}} placeholder='...' value=${jbKey} onChange=${e=>saveKey(e.target.value)} />
              </div>
              <div><label style=${lbl}>Bin ID</label>
                <input style=${{...IS,borderColor:'#bfdbfe'}} placeholder='6...' value=${jbBin} onChange=${e=>saveBin(e.target.value)} />
              </div>
            </div>
          </div>
          <div style=${{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:16,padding:24}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#15803d',marginBottom:6}}>📗 Google Sheets Webhook</div>
            <div><label style=${lbl}>Web-App URL</label>
              <input style=${{...IS,borderColor:'#bbf7d0'}} placeholder='https://script.google.com/macros/s/...' value=${gsUrl} onChange=${e=>saveGsUrl(e.target.value)} />
            </div>
          </div>
          <div style=${{background:'#fff',border:'1px solid #e2e8f0',borderRadius:16,padding:24}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#0f172a',marginBottom:16}}>Kampagne</div>
            <div style=${{display:'flex',flexDirection:'column',gap:12}}>
              ${[{k:'name',l:'Titel',ph:'Sammelbestellung Sanct Bernhard'},{k:'sponsor',l:'Sponsor',ph:'Sanct Bernhard'},{k:'deadline',l:'Bestellfrist',ph:'z.B. 15. März 2026'},{k:'description',l:'Info-Text',ph:'Kurze Beschreibung'}].map(f=>html`<div key=${f.k}>
                <label style=${lbl}>${f.l}</label>
                <input style=${IS} placeholder=${f.ph} value=${camp[f.k]} onChange=${e=>saveCamp({...camp,[f.k]:e.target.value})} />
              </div>`)}
            </div>
          </div>
          <div style=${{background:'#fff',border:'1px solid #e2e8f0',borderRadius:16,padding:24}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#0f172a',marginBottom:16}}>🔐 Admin-Passwort ändern</div>
            <div style=${{display:'flex',gap:10}}>
              <input type='password' style=${{...IS,flex:1}} placeholder='Neues Passwort' value=${newPwd} onChange=${e=>setNewPwd(e.target.value)} />
              <${Btn} onClick=${()=>{if(newPwd.trim().length>3){saveAdminPwd(newPwd.trim());setNewPwd('');alert('Passwort geändert!');}else{alert('Mindestens 4 Zeichen.');}}} sx=${{borderRadius:8,padding:'10px 16px',fontSize:13,flexShrink:0}}>Speichern<//>
            </div>
          </div>
          <div style=${{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:16,padding:24}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#15803d',marginBottom:6}}>💾 Als index.html exportieren</div>
            <p style=${{fontSize:13,color:'#16a34a',marginBottom:14,lineHeight:1.5}}>Bäckt alle Einstellungen in eine neue index.html – auf GitHub hochladen.</p>
            <${Btn} col='#15803d' onClick=${exportHTML} sx=${{borderRadius:8,padding:'9px 18px',fontSize:13}}>💾 index.html exportieren<//>
          </div>
          <div style=${{background:'#fff5f5',border:'1px solid #fecaca',borderRadius:16,padding:20}}>
            <div style=${{fontSize:15,fontWeight:800,color:'#991b1b',marginBottom:6}}>⚠ Neue Kampagne starten</div>
            <p style=${{fontSize:13,color:'#b91c1c',marginBottom:14,lineHeight:1.5}}>Löscht alle Bestellungen im Bin. Vorher exportieren!</p>
            <${Btn} col='#dc2626' onClick=${async()=>{if(window.confirm('Wirklich alle Bestellungen löschen?')){
                const ok = await jbSave(jbKey,jbBin,[{"_reset":true}]);
                if(ok){ saveOrds([]); alert('Bestellungen wurden in JSONBin gelöscht!'); }
                else alert('Fehler: JSONBin nicht erreichbar. Bitte API Key prüfen.');
              }}} sx=${{borderRadius:8,padding:'9px 18px',fontSize:13}}>Bestellungen zurücksetzen<//>
          </div>
        </div>`:''}

      </div>
    </div>`;
  }

  const cats = [...new Set(prods.map(p=>p.cat||'Alle Artikel'))];
  const canSub = buyer.name.trim()&&buyer.email.trim()&&cartQty>0&&!sub;

  return html`<div style=${{minHeight:'100vh',paddingBottom:240}}>
    <div style=${{background:'#fff',borderBottom:'1px solid #f1f5f9',position:'sticky',top:0,zIndex:10}}>
      <div style=${{maxWidth:680,margin:'0 auto',padding:'16px 20px',display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <div style=${{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:2}}>Team Rynkeby RheinRuhr</div>
          <h1 style=${{margin:0,fontSize:21,fontWeight:800,color:'#0f172a',lineHeight:1.2}}>${camp.name||'Sammelbestellung'}</h1>
          ${camp.sponsor?html`<div style=${{fontSize:12,color:'#64748b',marginTop:3}}>von ${camp.sponsor}</div>`:''}
          ${camp.deadline?html`<div style=${{fontSize:12,color:'#dc2626',fontWeight:700,marginTop:3}}>⏱ Bestellfrist: ${camp.deadline}</div>`:''}
        </div>
        <button onClick=${()=>setPage('admin')} title='Admin' style=${{background:'transparent',border:'none',color:'#e2e8f0',cursor:'pointer',fontSize:20,padding:4,marginTop:4}}>⚙</button>
      </div>
      ${camp.description?html`<div style=${{maxWidth:680,margin:'0 auto',padding:'0 20px 14px'}}><p style=${{margin:0,fontSize:13,color:'#64748b',lineHeight:1.5}}>${camp.description}</p></div>`:''}
    </div>

    <div style=${{maxWidth:680,margin:'0 auto',padding:'24px 20px 0'}}>
      ${cats.map(cat=>html`<div key=${cat} style=${{marginBottom:28}}>
        ${cats.length>1?html`<div style=${{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>${cat}</div>`:''}
        <div style=${{display:'flex',flexDirection:'column',gap:10}}>
          ${prods.filter(p=>(p.cat||'Alle Artikel')===cat).map(p=>{
            const qty=cart[p.id]||0;
            const hasDis=p.preis&&p.uvp&&parseFloat(p.preis)<parseFloat(p.uvp);
            const dp=p.preis||p.uvp;
            return html`<div key=${p.id} style=${{background:'#fff',borderRadius:14,padding:'14px 16px',border:'1px solid '+(qty>0?'#fca5a5':'#e2e8f0'),outline:qty>0?'3px solid #fee2e2':'none',transition:'all 0.15s'}}>
              <div style=${{display:'flex',alignItems:'flex-start',gap:12}}>
                ${p.img?html`<img src=${p.img} alt=${p.name} onError=${e=>{e.target.style.display='none';}} style=${{width:72,height:72,objectFit:'contain',borderRadius:8,border:'1px solid #f1f5f9',flexShrink:0,background:'#f8fafc'}} />`:''}
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontWeight:700,color:'#0f172a',fontSize:14}}>${p.name}</div>
                  ${p.nr?html`<div style=${{fontSize:11,color:'#94a3b8',marginTop:2}}>Bestell-Nr.: ${p.nr}</div>`:''}
                  ${p.desc?html`<p style=${{margin:'4px 0 0',fontSize:12,color:'#64748b',lineHeight:1.5,whiteSpace:'pre-line'}}>${p.desc}</p>`:''}
                </div>
                <div style=${{textAlign:'right',flexShrink:0}}>
                  ${dp?html`<div>
                    ${hasDis?html`<div style=${{fontSize:11,color:'#94a3b8',textDecoration:'line-through'}}>${fmtP(p.uvp)}</div>`:''}
                    <div style=${{fontWeight:800,fontSize:15,color:p.preis?'#dc2626':'#374151'}}>${fmtP(dp)}</div>
                  </div>`:html`<div style=${{fontSize:12,color:'#94a3b8'}}>Preis folgt</div>`}
                </div>
              </div>
              <div style=${{marginTop:12,display:'flex',justifyContent:'flex-end',alignItems:'center',gap:12}}>
                <button onClick=${()=>setQty(p.id,-1)} style=${{width:32,height:32,borderRadius:'50%',border:'1px solid #e2e8f0',background:'transparent',color:'#64748b',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>−</button>
                <span style=${{fontWeight:800,fontSize:16,minWidth:20,textAlign:'center',color:qty>0?'#dc2626':'#0f172a'}}>${qty}</span>
                <button onClick=${()=>setQty(p.id,1)} style=${{width:32,height:32,borderRadius:'50%',border:'1px solid '+(qty>0?'transparent':'#dc2626'),background:qty>0?'#dc2626':'transparent',color:qty>0?'#fff':'#dc2626',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>+</button>
              </div>
            </div>`;
          })}
        </div>
      </div>`)}
    </div>

    <div style=${{position:'fixed',bottom:0,left:0,right:0,background:'#fff',borderTop:'1px solid #e2e8f0',boxShadow:'0 -4px 20px rgba(0,0,0,0.07)',zIndex:20}}>
      <div style=${{maxWidth:680,margin:'0 auto',padding:'14px 20px'}}>
        <div style=${{display:'flex',gap:10,marginBottom:10}}>
          <input placeholder='Dein Name *' style=${{...IS,flex:1,minWidth:0}} value=${buyer.name} onChange=${e=>setBuyer(b=>({...b,name:e.target.value}))} />
          <input placeholder='E-Mail-Adresse *' type='email' style=${{...IS,flex:1,minWidth:0}} value=${buyer.email} onChange=${e=>setBuyer(b=>({...b,email:e.target.value}))} />
        </div>
        <input placeholder='Anmerkungen (optional)' style=${{...IS,marginBottom:subErr?'6px':'10px'}} value=${buyer.note} onChange=${e=>setBuyer(b=>({...b,note:e.target.value}))} />
        ${subErr?html`<p style=${{fontSize:12,color:'#dc2626',marginBottom:8}}>${subErr}</p>`:''}
        <button onClick=${submit} disabled=${!canSub} style=${{background:canSub?'#dc2626':'#f1f5f9',color:canSub?'#fff':'#94a3b8',border:'none',borderRadius:12,padding:'13px 20px',fontSize:15,fontWeight:800,cursor:canSub?'pointer':'not-allowed',width:'100%',transition:'all 0.15s',fontFamily:'inherit'}}>
          ${sub?'Wird gesendet…':cartQty>0?'Bestellung absenden – '+cartQty+' Artikel'+(cartTot>0?' · '+fmtP(cartTot):''):'Artikel auswählen und Bestellung absenden'}
        </button>
      </div>
    </div>
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
